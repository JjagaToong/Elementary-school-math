<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6학년 수학 마스터: 몬스터 레이드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #2c3e50; color: white; text-align: center; padding: 20px; }
        #game-container { background: #34495e; border: 4px solid #f1c40f; border-radius: 20px; padding: 20px; display: inline-block; width: 90%; max-width: 500px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .stat-bar { background: #eee; height: 20px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #hp-fill { background: #e74c3c; width: 100%; height: 100%; transition: 0.5s; }
        #monster-img { font-size: 80px; margin: 20px; }
        .problem-box { background: white; color: #2c3e50; padding: 20px; border-radius: 10px; font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        input { font-size: 20px; width: 120px; padding: 10px; border-radius: 5px; border: none; text-align: center; }
        button { font-size: 20px; background: #f1c40f; color: #2c3e50; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        button:hover { background: #d4ac0d; }
        #log { margin-top: 15px; font-size: 16px; color: #ecf0f1; min-height: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <h2>LV.6 수학 기사단</h2>
    <div id="monster-img">🐉</div>
    <div style="text-align: left; font-size: 14px;">몬스터 HP</div>
    <div class="stat-bar"><div id="hp-fill"></div></div>
    
    <div class="problem-box" id="question">문제를 불러오는 중...</div>
    
    <input type="text" id="answer" placeholder="정답 입력" onkeyup="if(window.event.keyCode==13){attack()}">
    <button onclick="attack()">공격!</button>
    
    <div id="log">몬스터가 나타났습니다! 수학으로 공격하세요!</div>
</div>

<script>
    let hp = 100;
    let currentAnswer = 0;
    const monsters = ['🐉', '👹', '🔱', '🛸', '🐘'];

    function makeQuestion() {
        const type = Math.floor(Math.random() * 3);
        let qText = "";

        if (type === 0) { // 소수의 곱셈/나눗셈
            let n1 = (Math.random() * 5 + 1).toFixed(1);
            let n2 = Math.floor(Math.random() * 9) + 2;
            currentAnswer = (parseFloat(n1) * n2).toFixed(1);
            qText = `${n1} × ${n2} = ?`;
        } else if (type === 1) { // 비와 비율 (백분율)
            let total = 100;
            let part = Math.floor(Math.random() * 90) + 5;
            currentAnswer = part;
            qText = `${part} / ${total} 을 백분율(%)로?`;
        } else { // 분수의 나눗셈 (간단한 형태)
            let bottom = Math.floor(Math.random() * 5) + 2;
            let top = Math.floor(Math.random() * 8) + 2;
            currentAnswer = top;
            qText = `(${top}/${bottom}) ÷ (1/${bottom}) = ?`;
        }

        document.getElementById('question').innerText = qText;
        document.getElementById('answer').value = "";
        document.getElementById('answer').focus();
    }

    function attack() {
        const userAns = document.getElementById('answer').value;
        const log = document.getElementById('log');
        const hpFill = document.getElementById('hp-fill');

        if (userAns == currentAnswer) {
            hp -= 25;
            log.innerText = "💥 크리티컬 히트! (정답: " + currentAnswer + ")";
            log.style.color = "#2ecc71";
            hpFill.style.width = hp + "%";

            if (hp <= 0) {
                log.innerText = "🏆 승리! 다음 몬스터가 나타납니다!";
                hp = 100;
                hpFill.style.width = "100%";
                document.getElementById('monster-img').innerText = monsters[Math.floor(Math.random() * monsters.length)];
            }
            makeQuestion();
        } else {
            log.innerText = "🛡️ 공격 실패! 다시 계산해 보세요.";
            log.style.color = "#e74c3c";
        }
    }

    makeQuestion();
</script>

</body>
</html>
