<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초등 3학년 수학 탐험대</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f0f8ff; padding: 20px; }
        #game-container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: inline-block; min-width: 350px; }
        h1 { color: #ff6b6b; }
        .problem { font-size: 40px; margin: 20px; color: #333; }
        input { font-size: 24px; width: 80px; text-align: center; border: 3px solid #4ecdc4; border-radius: 10px; padding: 5px; }
        button { font-size: 20px; background: #ff9f43; color: white; border: none; border-radius: 10px; padding: 10px 20px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ee5253; }
        #message { margin-top: 20px; font-size: 20px; font-weight: bold; height: 30px; }
        .score { font-size: 18px; color: #555; margin-bottom: 10px; }
        .monster { font-size: 60px; margin: 10px; transition: transform 0.2s; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>👾 수학 몬스터 퇴치!</h1>
    <div class="score">잡은 몬스터: <span id="score">0</span>마리</div>
    <div id="monster-img" class="monster">👻</div>
    <div class="problem" id="question">준비 시작!</div>
    <input type="number" id="answer" placeholder="?" onkeyup="if(window.event.keyCode==13){checkAnswer()}">
    <br><br>
    <button onclick="checkAnswer()">정답 확인!</button>
    <div id="message"></div>
</div>

<script>
    let currentAns = 0;
    let score = 0;
    const monsters = ['👻', '👹', '👾', '👽', '🤖', '🐲'];

    function makeProblem() {
        // 3학년 수준의 곱셈과 나눗셈 섞기
        const type = Math.random() > 0.5 ? 'mul' : 'div';
        let qText = "";
        
        if (type === 'mul') {
            let n1 = Math.floor(Math.random() * 9) + 2; // 2~9단
            let n2 = Math.floor(Math.random() * 9) + 1;
            currentAns = n1 * n2;
            qText = `${n1} × ${n2} = `;
        } else {
            let n2 = Math.floor(Math.random() * 8) + 2; // 나누는 수
            let ans = Math.floor(Math.random() * 9) + 1; // 몫
            let n1 = n2 * ans; // 나누어지는 수
            currentAns = ans;
            qText = `${n1} ÷ ${n2} = `;
        }
        
        document.getElementById('question').innerText = qText;
        document.getElementById('answer').value = "";
        document.getElementById('answer').focus();
    }

    function checkAnswer() {
        const userAns = document.getElementById('answer').value;
        const msg = document.getElementById('message');
        const monster = document.getElementById('monster-img');

        if (parseInt(userAns) === currentAns) {
            score++;
            msg.innerText = "정답이야! 몬스터를 잡았어! ✨";
            msg.style.color = "#2ecc71";
            document.getElementById('score').innerText = score;
            
            // 몬스터 랜덤 교체 및 애니메이션
            monster.innerText = monsters[Math.floor(Math.random() * monsters.length)];
            monster.style.transform = "scale(1.2)";
            setTimeout(() => { monster.style.transform = "scale(1)"; }, 200);
            
            makeProblem();
        } else {
            msg.innerText = "다시 한번 생각해봐! 🧐";
            msg.style.color = "#e74c3c";
        }
    }

    // 게임 시작
    makeProblem();
</script>

</body>
</html>
